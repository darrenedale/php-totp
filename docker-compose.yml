services:
  php-totp-8.2:
    container_name: "php-totp-8.2"
    build:
      dockerfile: "./Dockerfile"
      args:
        PHP_VERSION: "8.2"
    volumes:
      - "./:/php-totp"
    user: "totp"
    working_dir: "/php-totp"
    stdin_open: true
    tty: true
    environment:
      PHP_IDE_CONFIG: "serverName=php-totp-docker"
      XDEBUG_CONFIG: "client_host=xdebug-client"
      XDEBUG_SESSION: 1
    extra_hosts:
      - "xdebug-client:host-gateway"

