services:
  php-cli-82:
    container_name: "totp-php82"
    image: "darrenedale/equit:php-8.2-cli"
    volumes:
      - "./:/php-totp"
    working_dir: "/php-totp"
    stdin_open: true
    tty: true
    environment:
      PHP_IDE_CONFIG: "serverName=php-totp-docker"
      XDEBUG_CONFIG: "client_host=xdebug-client"
      XDEBUG_SESSION: 1
    extra_hosts:
      - "xdebug-client:host-gateway"

  php-cli-83:
    container_name: "totp-php83"
